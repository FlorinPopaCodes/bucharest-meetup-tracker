name: Scrape Bucharest meetups

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-bucharest
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('deno.json') }}
          restore-keys: deno-

      - name: Scrape
        run: deno task scrape

      - name: Postprocess (README + heatmaps)
        run: deno task postprocess

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ assets/ README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: scrape $(date -u +%Y-%m-%d)"
            git push
          fi
