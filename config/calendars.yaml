# Hardcoded seed calendars to crawl in addition to geo-based discovery.
# Each entry is a lu.ma slug (the "lu.ma/<slug>" path).
# Calendar events still pass through the Bucharest filter, so out-of-Bucharest
# events from these calendars are dropped.
seed_calendars:
  - turadeduminica

# Non-lu.ma iCal (.ics) feeds. Only VEVENTs tagged with `category` are kept,
# and they still pass the Bucharest text filter (on the iCal LOCATION field).
ical_feeds:
  - name: Roaba de Cultură
    slug: roaba-de-cultura
    url: "https://greenrevolution.ro/?post_type=tribe_events&ical=1&eventDisplay=list"
    category: "2024"

# iaBilet.ro venue pages. No feed exists, so we parse the schema.org JSON-LD
# Event blocks off a single venue page. Date-only (iaBilet exposes no time-of-day).
# Each event still passes the Bucharest text filter on its JSON-LD addressLocality,
# so touring shows (e.g. Costinești) are dropped.
iabilet_venues:
  - name: Teatrul Improteca
    slug: improteca
    url: "https://www.iabilet.ro/bilete-teatrul-improteca-venue-5427/"
